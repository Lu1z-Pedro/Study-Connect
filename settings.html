<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuracoes | Study Connect</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="settings">
    <main class="layout">
      <header class="topbar">
        <div>
          <span class="badge">Configuracoes</span>
          <h1>Perfil atual</h1>
        </div>
        <div class="topbar__actions">
          <a class="button button--ghost" href="teacher-dashboard.html">Voltar</a>
          <a class="button button--ghost" href="index.html">Ir para inicio</a>
        </div>
      </header>

      <section class="panel">
        <div data-settings-details></div>
        <div class="form-grid" data-teacher-select-container></div>
        <div class="panel-actions">
        </div>
      </section>

      <section class="panel">
        <h2>Entrar em contato</h2>
        <p>Se quiser entrar em contato comigo, use o botão abaixo.</p>
        <button class="button" type="button" data-contact>
          Entrar em contato
        </button>
      </section>
    </main>

    <script src="js/seed.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
