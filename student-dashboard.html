<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Aluno | Study Connect</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="student-dashboard">
    <main class="layout">
      <header class="topbar">
        <div>
          <span class="badge">Aluno</span>
          <h1 data-student-name>Aluno</h1>
          <p class="detail-meta">Continue sua trilha de estudos de hoje.</p>
        </div>
        <div class="topbar__actions">
          <a class="button button--ghost" href="settings.html">Configuracoes</a>
          <a class="button button--ghost" href="index.html">Voltar</a>
        </div>
      </header>

      <section class="section">
        <div class="filters">
          <div class="form-field">
            <label for="student-select">Aluno</label>
            <select id="student-select" data-switch-student></select>
          </div>
          <div class="form-field">
            <label for="subject-filter">Materia</label>
            <select id="subject-filter" data-subject-filter></select>
          </div>
        </div>

        <div class="grid" data-student-topics></div>
      </section>
    </main>

    <script src="js/seed.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
